name: Build add-on images

on:
  push:
    branches: [main]
    tags: ["[0-9]*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

# The ``home-assistant/builder`` action hardcodes the amd64-builder
# image, which can't ``exec`` on a native arm64 runner. Inline the
# action's ``docker run`` ourselves so we can pick the matching
# per-arch builder image (``ghcr.io/home-assistant/${arch}-builder``)
# on the matching native runner — no QEMU, no exec-format errors.

env:
  BUILDER_VERSION: "2024.08.2"

jobs:
  prepare:
    name: Decide what to build
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.matrix.outputs.addons }}
      publish: ${{ steps.matrix.outputs.publish }}
    steps:
      - id: matrix
        run: |
          # Pull requests build but do not publish. Tag pushes
          # publish only the stable add-on (the dev channel is
          # rebuilt continuously from main pushes).
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo 'addons=["social_home","social_home_dev"]' >> "$GITHUB_OUTPUT"
            echo 'publish=false' >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo 'addons=["social_home"]' >> "$GITHUB_OUTPUT"
            echo 'publish=true' >> "$GITHUB_OUTPUT"
          else
            echo 'addons=["social_home","social_home_dev"]' >> "$GITHUB_OUTPUT"
            echo 'publish=true' >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.addon }} (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.prepare.outputs.addons) }}
        arch: [aarch64, amd64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Read add-on metadata
        id: meta
        run: |
          version=$(yq -r '.version' "${{ matrix.addon }}/config.yaml")
          slug=$(yq -r '.slug' "${{ matrix.addon }}/config.yaml")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        if: needs.prepare.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and optionally push)
        run: |
          # Pick the per-arch HA builder image matching the host
          # runner. ``home-assistant/builder@2024.08.2``'s action
          # would have pinned amd64-builder, which is exec-format
          # incompatible with the ubuntu-24.04-arm runner.
          BUILDER_IMG="ghcr.io/home-assistant/${{ matrix.arch }}-builder:${BUILDER_VERSION}"
          docker pull "${BUILDER_IMG}"

          # Pass through every env var the builder might inspect,
          # minus the noisy / runner-specific ones (mirrors the
          # action.yml stanza).
          env > /tmp/env_file
          sed -i "/\(HOME\|TERM\|PWD\|HOSTNAME\|PATH\|SHLVL\|USER\|GOROOT\)/d" /tmp/env_file

          PUBLISH_FLAG="--test"
          if [[ "${{ needs.prepare.outputs.publish }}" == "true" ]]; then
            PUBLISH_FLAG="--docker-hub-check"
          fi

          docker run --rm --privileged \
              -v /var/run/docker.sock:/var/run/docker.sock:ro \
              -v ~/.docker:/root/.docker \
              -v "${{ github.workspace }}:/data" \
              --env-file /tmp/env_file \
              "${BUILDER_IMG}" \
              --${{ matrix.arch }} \
              --target ${{ matrix.addon }} \
              --image "social-home-io/ha-app-${{ steps.meta.outputs.slug }}-{arch}" \
              --version "${{ steps.meta.outputs.version }}" \
              ${PUBLISH_FLAG}
