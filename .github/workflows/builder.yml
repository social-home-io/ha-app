name: Build add-on images

on:
  push:
    branches: [main]
    tags: ["[0-9]*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

# The ``home-assistant/builder`` action gained an ``image`` input in
# ``2026.03.x`` that picks the per-arch builder image; we set it to
# match the host runner's arch so the build is native (no QEMU). The
# action carries a deprecation warning — its replacement is a set of
# reusable actions in home-assistant/builder — but it still works
# end-to-end and the migration is a separate follow-up.

jobs:
  prepare:
    name: Decide what to build
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.matrix.outputs.addons }}
      publish: ${{ steps.matrix.outputs.publish }}
    steps:
      - id: matrix
        run: |
          # Pull requests build but do not publish. Tag pushes
          # publish only the stable add-on. Pushes to main publish
          # both channels so the early-access image picks up the
          # latest config.yaml CalVer in that folder.
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo 'addons=["socialhome","socialhome_early"]' >> "$GITHUB_OUTPUT"
            echo 'publish=false' >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo 'addons=["socialhome"]' >> "$GITHUB_OUTPUT"
            echo 'publish=true' >> "$GITHUB_OUTPUT"
          else
            echo 'addons=["socialhome","socialhome_early"]' >> "$GITHUB_OUTPUT"
            echo 'publish=true' >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.addon }} (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.prepare.outputs.addons) }}
        arch: [aarch64, amd64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Read add-on metadata
        id: meta
        run: |
          version=$(yq -r '.version' "${{ matrix.addon }}/config.yaml")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        if: needs.prepare.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and optionally push)
        uses: home-assistant/builder@2026.03.2
        with:
          # Match the builder helper image to the runner arch so the
          # build runs natively (amd64-builder on ubuntu-24.04,
          # aarch64-builder on ubuntu-24.04-arm).
          image: ${{ matrix.arch }}
          # ``--image`` is intentionally omitted — the builder reads
          # the registry + image template from ``config.yaml::image``
          # (split on the last ``/``). Passing ``--image`` without a
          # matching ``--docker-hub`` overrides only the image half,
          # leaving the registry empty → leading-slash tag.
          args: |
            --${{ matrix.arch }} \
            --target ${{ matrix.addon }} \
            --version "${{ steps.meta.outputs.version }}" \
            ${{ needs.prepare.outputs.publish == 'true' && '--docker-hub-check' || '--test' }}
