name: Build add-on images

on:
  push:
    branches: [main]
    tags: ["[0-9]*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

# We don't use ``home-assistant/builder`` because its helper image is
# amd64-only and can't run on a native arm64 runner — which is the
# whole reason we left QEMU. Native ``docker/build-push-action``
# gives us one job per arch on the matching native runner.

jobs:
  prepare:
    name: Decide what to build
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.matrix.outputs.addons }}
      publish: ${{ steps.matrix.outputs.publish }}
    steps:
      - id: matrix
        run: |
          # Pull requests build but do not publish. Tag pushes
          # publish only the stable add-on (the dev channel is
          # rebuilt continuously from main pushes).
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo 'addons=["social_home","social_home_dev"]' >> "$GITHUB_OUTPUT"
            echo 'publish=false' >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo 'addons=["social_home"]' >> "$GITHUB_OUTPUT"
            echo 'publish=true' >> "$GITHUB_OUTPUT"
          else
            echo 'addons=["social_home","social_home_dev"]' >> "$GITHUB_OUTPUT"
            echo 'publish=true' >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.addon }} (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.prepare.outputs.addons) }}
        arch: [aarch64, amd64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Read add-on metadata
        id: meta
        run: |
          # Pull the values we need out of config.yaml / build.yaml.
          # ``yq`` ships on ubuntu-* runners; we don't want to
          # re-implement YAML parsing in bash.
          version=$(yq -r '.version' "${{ matrix.addon }}/config.yaml")
          slug=$(yq -r '.slug' "${{ matrix.addon }}/config.yaml")
          name=$(yq -r '.name' "${{ matrix.addon }}/config.yaml")
          description=$(yq -r '.description' "${{ matrix.addon }}/config.yaml")
          image=$(yq -r '.image' "${{ matrix.addon }}/config.yaml" \
            | sed "s|{arch}|${{ matrix.arch }}|g")
          build_from=$(yq -r ".build_from.${{ matrix.arch }}" "${{ matrix.addon }}/build.yaml")
          socialhome_version=$(yq -r '.args.SOCIALHOME_VERSION' "${{ matrix.addon }}/build.yaml")
          {
            echo "version=${version}"
            echo "slug=${slug}"
            echo "name=${name}"
            echo "description=${description}"
            echo "image=${image}"
            echo "build_from=${build_from}"
            echo "socialhome_version=${socialhome_version}"
            echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: needs.prepare.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build${{ needs.prepare.outputs.publish == 'true' && ' and push' || '' }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.addon }}
          file: ./${{ matrix.addon }}/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ needs.prepare.outputs.publish == 'true' }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          build-args: |
            BUILD_FROM=${{ steps.meta.outputs.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_NAME=${{ steps.meta.outputs.name }}
            BUILD_DESCRIPTION=${{ steps.meta.outputs.description }}
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            SOCIALHOME_VERSION=${{ steps.meta.outputs.socialhome_version }}
