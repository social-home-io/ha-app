---
# Stable add-on builds on the official ``python:3.14-slim``
# (Debian slim) image and installs ``socialhome==${SOCIALHOME_VERSION}``
# from PyPI inside the Dockerfile. Mirrors the home-assistant/addons
# reference style (see ``configurator``) — Supervisor passes
# ``args`` through as build-args so bumping the pin here is enough to
# repin the install on the next add-on update. ``config.yaml``'s
# ``version`` field still drives the user-visible add-on version and
# should be bumped in lock-step.
#
# armv7 is unsupported: several runtime dependencies
# (``aiolibdatachannel``, ``cryptography``, ``av``) only publish
# cp314 manylinux wheels for x86_64 / aarch64, and source-building
# them on armv7 inside a Supervisor host doesn't finish in any
# reasonable time.

build_from:
  aarch64: python:3.14-slim
  amd64: python:3.14-slim

args:
  SOCIALHOME_VERSION: "2026.5.10"

labels:
  org.opencontainers.image.title: Social Home
  org.opencontainers.image.description: Your private, federated household social network.
  org.opencontainers.image.source: https://github.com/social-home-io/ha-app
  org.opencontainers.image.licenses: MPL-2.0
