---
name: Social Home
version: "2026.5.10"
slug: social_home
description: Your private, federated household social network.
url: https://social-home.io
arch:
  - aarch64
  - amd64
init: false
homeassistant: "2026.3"
startup: services
panel_icon: mdi:home-account
panel_title: Social Home

# Ingress proxies the web UI through HA's auth — no extra port to expose.
ingress: true

# Supervisor APIs needed for HaBootstrap to read the HA owner,
# mint the integration token, and push Supervisor discovery so
# the matching ha-integration auto-configures itself.
hassio_api: true
homeassistant_api: true
auth_api: true

# Persistent storage — SQLite + media survive add-on updates.
# Long-form because the addon-linter rejects the short ``data:rw``
# shorthand; the long form spells out the same thing.
map:
  - type: data
    read_only: false

options:
  log_level: info
  ai_task_entity_id: ""
  stt_entity_id: ""

schema:
  log_level: list(trace|debug|info|warning|error|fatal)
  # HA ``ai_task.*`` entity (e.g. ``ai_task.openai``) used by the
  # calendar photo importer and any future AI-task feature. Empty
  # leaves the AI surface off instead of failing loudly.
  ai_task_entity_id: str?
  # HA ``stt.*`` entity used for in-app voice-to-text. Empty leaves
  # ``Capability.STT`` off so the SPA hides the mic affordance.
  stt_entity_id: str?

image: ghcr.io/social-home-io/ha-app-social-home-{arch}
