---
name: Social Home
version: "2026.4.25"
slug: social_home
description: Your private, federated household social network.
url: https://social-home.io
arch:
  - aarch64
  - amd64
  - armv7
init: false
homeassistant: "2026.3"
boot: auto
startup: services
hassio_role: default
panel_icon: mdi:home-account
panel_title: Social Home

# Ingress proxies the web UI through HA's auth — no extra port to expose.
ingress: true
ingress_port: 8099

# Supervisor APIs needed for HaBootstrap to read the HA owner,
# mint the integration token, and push Supervisor discovery so
# the matching ha-integration auto-configures itself.
hassio_api: true
homeassistant_api: true
auth_api: true

# Persistent storage — SQLite + media survive add-on updates.
map:
  - data:rw

# GFS endpoint (only listens when ``gfs_enable: true``); not
# Ingress-proxied because peers dial it from the internet.
ports:
  8124/tcp: null
ports_description:
  8124/tcp: GFS federation endpoint (only used when GFS mode is enabled)

options:
  log_level: info
  turn_url: ""
  turn_secret: ""
  ai_calendar_import_agent: ""
  gfs_enable: false
  gfs_base_url: ""

schema:
  log_level: list(trace|debug|info|warning|error|fatal)
  turn_url: str?
  turn_secret: password?
  ai_calendar_import_agent: str?
  gfs_enable: bool
  gfs_base_url: str?

image: ghcr.io/social-home-io/ha-app-social-home-{arch}
