---
# Early-access add-on uses the same HA python-base image + style
# as stable (see ``socialhome/build.yaml`` for the rationale).
# The pin here can run ahead of stable on a CalVer pre-release
# (e.g. ``2026.5.11rc1``) — the two add-ons have separate slugs,
# so the Supervisor treats them as independent installs and the
# versions don't need to be ordered against each other.

build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base-python:3.14-alpine3.23
  amd64: ghcr.io/home-assistant/amd64-base-python:3.14-alpine3.23

args:
  SOCIALHOME_VERSION: "2026.5.13.3"
  # See the stable ``build.yaml`` for the bump-cadence rationale.
  CUSTOM_COMPONENT_VERSION: "2026.5.11.4"

labels:
  org.opencontainers.image.title: Social Home (Early)
  org.opencontainers.image.description: Early-access channel for Social Home — release candidates soak here before being promoted to the stable add-on.
  org.opencontainers.image.source: https://github.com/social-home-io/ha-app
  org.opencontainers.image.licenses: MPL-2.0
