---
# Dev add-on uses the same HA python-base image + style as stable
# (see ``social_home/build.yaml`` for the rationale). The pin lives
# here so the dev channel can ride ahead of stable on a CalVer
# pre-release without the Supervisor sorting the two add-ons into
# the wrong order; the ``-dev`` suffix on ``config.yaml``'s
# ``version`` field keeps the Supervisor happy.

build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base-python:3.14-alpine3.23
  amd64: ghcr.io/home-assistant/amd64-base-python:3.14-alpine3.23

args:
  SOCIALHOME_VERSION: "2026.5.10"

labels:
  org.opencontainers.image.title: Social Home (Dev)
  org.opencontainers.image.description: Bleeding-edge build of Social Home — tracks the main branch.
  org.opencontainers.image.source: https://github.com/social-home-io/ha-app
  org.opencontainers.image.licenses: MPL-2.0
