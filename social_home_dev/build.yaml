---
# Dev add-on builds on the official ``python:3.14-slim``
# (Debian slim) image and installs ``socialhome==${SOCIALHOME_VERSION}``
# from PyPI inside the Dockerfile — same shape as the stable
# channel. The pin lives here (not in ``config.yaml``) so the dev
# channel can ride ahead of stable on a CalVer pre-release without
# the Supervisor sorting the two add-ons into the wrong order; the
# ``-dev`` suffix on ``config.yaml``'s ``version`` field keeps the
# Supervisor happy.
#
# armv7 is unsupported here for the same reason as stable: missing
# cp314 manylinux wheels for ``aiolibdatachannel`` / ``cryptography``
# / ``av``.

build_from:
  aarch64: python:3.14-slim
  amd64: python:3.14-slim

args:
  SOCIALHOME_VERSION: "2026.5.10"

labels:
  org.opencontainers.image.title: Social Home (Dev)
  org.opencontainers.image.description: Bleeding-edge build of Social Home — tracks the main branch.
  org.opencontainers.image.source: https://github.com/social-home-io/ha-app
  org.opencontainers.image.licenses: MPL-2.0
