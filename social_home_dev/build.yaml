---
# Dev add-on always rebuilds against ``ghcr.io/social-home-io/socialhome:main``
# so every push to the upstream main branch lands here on the
# next Supervisor refresh. ``config.yaml`` carries
# ``2026.4.25-dev`` so the Supervisor sorts dev *ahead* of stable
# and the two add-ons coexist without a version collision.

build_from:
  aarch64: ghcr.io/social-home-io/socialhome:main
  amd64: ghcr.io/social-home-io/socialhome:main
  armv7: ghcr.io/social-home-io/socialhome:main

labels:
  org.opencontainers.image.title: Social Home (Dev)
  org.opencontainers.image.description: Bleeding-edge build of Social Home — tracks the main branch.
  org.opencontainers.image.source: https://github.com/social-home-io/ha-app
  org.opencontainers.image.licenses: MPL-2.0
